# Phase 0 frozen contract — Router / Talk Service public API.
# Consumed by Lane A (implements), Lane C (forwards to), Lane F (client).
openapi: 3.1.0
info:
  title: Bard — Router / Talk Service API
  version: 0.0.1
  description: >
    Public entrypoint. Validates the JWT, resolves metadata.targetAgent via the
    Registry, forwards the request to the agent over TLS, and relays the JSON
    response. type=voice is not implemented in the MVP (returns 501).
servers:
  - url: https://localhost:8443
paths:
  /v1/message:
    post:
      summary: Send a text (MVP) or voice (501) message to an agent
      operationId: postMessage
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "./protocol.schema.json#/$defs/Request" }
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema: { $ref: "./protocol.schema.json#/$defs/Response" }
        "401":
          description: Invalid or missing JWT (error=unauthorized)
          content:
            application/json:
              schema: { $ref: "./protocol.schema.json#/$defs/Error" }
        "404":
          description: targetAgent not in registry (error=not_found)
          content:
            application/json:
              schema: { $ref: "./protocol.schema.json#/$defs/Error" }
        "501":
          description: voice not implemented in MVP (error=unsupported_type)
          content:
            application/json:
              schema: { $ref: "./protocol.schema.json#/$defs/Error" }
        "502":
          description: Agent unreachable (error=agent_unavailable, retry=true)
          content:
            application/json:
              schema: { $ref: "./protocol.schema.json#/$defs/Error" }
  /channels/{channelId}/ping:
    post:
      summary: Ping a box — push a one-way signal to every other live member (Step S6)
      operationId: pingChannel
      description: >
        A channel member pushes a one-way "box.ping" to every OTHER member of
        the channel that holds a live broker link (/v1/agent-link). Authed by
        the same fleet-or-device verifier as /v1/message — the bearer's `sub`
        is the sender deviceId. The caller MUST be a member of the channel
        (403 otherwise). The sender is excluded; a member with no live link is
        not delivered to (listed in `offline`), which is NOT an error. Each
        delivered member receives a broker-link.schema.json#/$defs/BoxPingFrame.
        Voice/LiveKit is out of the MVP — this is the cross-device signal.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: channelId, in: path, required: true, schema: { type: string, minLength: 1 } }
      responses:
        "200":
          description: Fan-out result — who got the ping and who was offline.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PingResponse" }
        "401":
          description: Invalid or missing bearer (error=unauthorized)
          content:
            application/json:
              schema: { $ref: "./protocol.schema.json#/$defs/Error" }
        "403":
          description: Caller is not a member of the channel (error=forbidden)
          content:
            application/json:
              schema: { $ref: "./protocol.schema.json#/$defs/Error" }
  /healthz:
    get:
      summary: Liveness probe
      operationId: routerHealth
      responses:
        "200": { description: OK }
  /metrics:
    get:
      summary: Prometheus exposition (unauthenticated scrape, like /healthz)
      operationId: routerMetrics
      responses:
        "200":
          description: OK
          content:
            text/plain: {}
  /version:
    get:
      summary: Build version (vX.Y.Z + sha + date)
      operationId: routerVersion
      responses:
        "200": { description: OK }
components:
  schemas:
    PingResponse:
      type: object
      additionalProperties: false
      required: [delivered, offline]
      description: >
        POST /channels/{channelId}/ping 200 result. `delivered` is the deviceIds
        whose live link received the box.ping frame; `offline` is the members
        with no live link (not delivered — not an error). The sender is in
        neither list (you do not ping yourself).
      properties:
        delivered:
          type: array
          items: { type: string, minLength: 1 }
          description: Members whose live broker link received the ping frame.
        offline:
          type: array
          items: { type: string, minLength: 1 }
          description: Members with no live link at ping time (not delivered to).
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

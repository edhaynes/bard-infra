# Refinery topology — modeled on ExxonMobil Baytown (public data only; synthetic tags).
# Frozen contract for the refinery-demo orchestrator. Element telemetry ranges are
# real industry ranges; unit/tag names are Baytown-flavored, industry-standard
# conventions ("Pipestill 7" is the one confirmed-public Baytown unit name).
#
# Schema:
#   refinery: {name, crude_capacity_bpd}
#   utilities: [ids of utility resources that gate hydrocarbon/fired/hydroprocessing units]
#   interlocks: bring-up gates — each {id, requires:[unit ids running], gates:<tag>}
#   sections: ordered cells. bringup_order drives startup; shutdown is reverse.
#     each section: {id, name, bringup_order, network:{...}, units:[...]}
#       network: section-shared gear (switch, gateway, hmi, ews) — every unit's
#                elements sit behind the section switch -> gateway (Purdue L2/L3 path).
#       unit: {id, name, kind, gates:[tags], provides:[utilities], consumes:[utilities],
#              feeds:[downstream unit ids], elements:[...]}
#         element: {type, tag, signal, unit, normal:[lo,hi], setpoint?,
#                   alarm_high?, alarm_low?, trip_high?, trip_low?}

refinery:
  name: "Baytown (modeled)"
  crude_capacity_bpd: 588000

# Utility resources whose producing units must be RUNNING before dependent units start.
utilities: [steam, cooling_water, instrument_air, flare, hydrogen, fuel_gas, sru]

# Bring-up interlock gates (hard). A unit carrying gate tag <g> cannot leave STARTING
# until the gate's `requires` units are all RUNNING.
interlocks:
  - id: flare_live
    requires: [U-FL1]
    gates: hydrocarbon          # nothing accepts hydrocarbons until flare is live
  - id: steam_available
    requires: [U-900]
    gates: fired                # no fired heater / column without steam
  - id: cooling_available
    requires: [U-CT1]
    gates: fired
  - id: hydrogen_available
    requires: [U-950]
    gates: hydroprocessing      # no feed to hydrotreater/hydrocracker without H2
  - id: sru_live
    requires: [U-910]
    gates: sulfur               # no high-sulfur feed without sulfur recovery
  - id: crude_running
    requires: [U-110, U-120, U-135]
    gates: conversion           # FCC/coker/HCU are fed by crude/vacuum

sections:

  # ---------------------------------------------------------------- S4 Utilities
  - id: S4
    name: "Utilities & Offsites"
    bringup_order: 1
    network:
      switch:   {type: switch, tag: SW-S4, signal: throughput, unit: Mbps, normal: [50, 400], alarm_high: 850}
      gateway:  {type: gateway, tag: GW-S4, signal: sessions, unit: count, normal: [10, 120], alarm_high: 240}
      hmi:      {type: workstation, tag: HMI-S4, signal: alarms, unit: count, normal: [0, 4], alarm_high: 12}
      ews:      {type: workstation, tag: EWS-S4, signal: cpu, unit: pct, normal: [5, 40], alarm_high: 85}
    units:
      - id: U-900
        name: "Boiler House (HP/MP/LP steam)"
        kind: utility
        provides: [steam]
        consumes: [instrument_air, fuel_gas]
        feeds: []
        elements:
          - {type: sensor, tag: PT-9001, signal: pressure, unit: bar, normal: [40, 46], setpoint: 43, alarm_high: 50, trip_high: 55}
          - {type: sensor, tag: LT-9002, signal: level, unit: pct, normal: [40, 60], setpoint: 50, alarm_low: 25, trip_low: 15}
          - {type: sensor, tag: TT-9003, signal: temp, unit: degC, normal: [380, 440], setpoint: 410, alarm_high: 470}
          - {type: valve, tag: FV-9004, signal: position, unit: pct, normal: [30, 70], setpoint: 50}
          - {type: pump, tag: P-9005, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: dcs, tag: DCS-900, signal: scan, unit: ms, normal: [1, 18], alarm_high: 50}
      - id: U-CT1
        name: "Cooling Tower CT-1"
        kind: utility
        provides: [cooling_water]
        consumes: [instrument_air]
        feeds: []
        elements:
          - {type: sensor, tag: TT-CT11, signal: temp, unit: degC, normal: [25, 38], setpoint: 30, alarm_high: 45}
          - {type: sensor, tag: FT-CT12, signal: flow, unit: m3/h, normal: [8000, 12000], setpoint: 10000, alarm_low: 5000}
          - {type: pump, tag: P-CT13, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: plc, tag: PLC-CT1, signal: scan, unit: ms, normal: [1, 15], alarm_high: 40}
      - id: U-IA1
        name: "Instrument & Plant Air"
        kind: utility
        provides: [instrument_air]
        consumes: []
        feeds: []
        elements:
          - {type: sensor, tag: PT-IA11, signal: pressure, unit: bar, normal: [6.5, 8.5], setpoint: 7.5, alarm_low: 5.5, trip_low: 4.5}
          - {type: pump, tag: K-IA12, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: plc, tag: PLC-IA1, signal: scan, unit: ms, normal: [1, 15], alarm_high: 40}
      - id: U-FG1
        name: "Fuel Gas System"
        kind: utility
        provides: [fuel_gas]
        consumes: [instrument_air]
        feeds: []
        elements:
          - {type: sensor, tag: PT-FG11, signal: pressure, unit: bar, normal: [3.0, 5.0], setpoint: 4.0, alarm_low: 2.0}
          - {type: valve, tag: FV-FG12, signal: position, unit: pct, normal: [20, 60], setpoint: 40}
          - {type: plc, tag: PLC-FG1, signal: scan, unit: ms, normal: [1, 15], alarm_high: 40}
      - id: U-FL1
        name: "Flare & Relief FL-1"
        kind: utility
        provides: [flare]
        consumes: [instrument_air, fuel_gas]
        feeds: []
        elements:
          - {type: sensor, tag: BT-FL11, signal: flame, unit: pct, normal: [80, 100], setpoint: 95, alarm_low: 50}
          - {type: gas, tag: GD-FL12, signal: lel, unit: pctLEL, normal: [0, 5], alarm_high: 20, trip_high: 40}
          - {type: valve, tag: FV-FL13, signal: position, unit: pct, normal: [5, 30], setpoint: 15}
          - {type: sis, tag: SIS-FL1, signal: state, unit: sif, normal: [0, 0], trip_high: 1}
      - id: U-950
        name: "Hydrogen Plant (SMR-950)"
        kind: utility
        provides: [hydrogen]
        consumes: [steam, fuel_gas, cooling_water]
        feeds: []
        gates: [hydrocarbon, fired]
        elements:
          - {type: sensor, tag: TT-9501, signal: temp, unit: degC, normal: [820, 890], setpoint: 860, alarm_high: 920, trip_high: 950}
          - {type: sensor, tag: PT-9502, signal: pressure, unit: bar, normal: [20, 28], setpoint: 24, alarm_high: 32}
          - {type: valve, tag: FV-9503, signal: position, unit: pct, normal: [40, 75], setpoint: 60}
          - {type: pump, tag: K-9504, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: plc, tag: PLC-950, signal: scan, unit: ms, normal: [1, 18], alarm_high: 50}
          - {type: sis, tag: SIS-950, signal: state, unit: sif, normal: [0, 0], trip_high: 1}


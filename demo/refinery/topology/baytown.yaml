          - {type: pump, tag: K-2604, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: dcs, tag: DCS-260, signal: scan, unit: ms, normal: [1, 18], alarm_high: 50}
          - {type: sis, tag: SIS-260, signal: state, unit: sif, normal: [0, 0], trip_high: 1}
      - id: U-310
        name: "Powerformer (CRU-310)"
        kind: reforming
        gates: [hydrocarbon, fired, hydroprocessing]
        consumes: [steam, cooling_water, hydrogen]
        feeds: [U-TF1]
        elements:
          - {type: sensor, tag: TT-3101, signal: temp, unit: degC, normal: [490, 530], setpoint: 510, alarm_high: 560, trip_high: 580}

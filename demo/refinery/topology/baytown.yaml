          - {type: sensor, tag: PT-1202, signal: pressure, unit: bar, normal: [1.0, 2.2], setpoint: 1.6, alarm_high: 3.0}
          - {type: sensor, tag: LT-1203, signal: level, unit: pct, normal: [35, 65], setpoint: 50, alarm_low: 20, trip_low: 10}
          - {type: valve, tag: FV-1204, signal: position, unit: pct, normal: [40, 75], setpoint: 60}
          - {type: pump, tag: P-1205, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: dcs, tag: DCS-120, signal: scan, unit: ms, normal: [1, 18], alarm_high: 50}
      - id: U-135
        name: "Pipestill 7 (PS-7)"
        kind: separation
        gates: [hydrocarbon, fired]
        consumes: [steam, cooling_water, fuel_gas]
        feeds: [U-840, U-610, U-310]
        elements:
          - {type: sensor, tag: TT-1351, signal: temp, unit: degC, normal: [330, 365], setpoint: 350, alarm_high: 385, trip_high: 400}

          - {type: sensor, tag: LT-1353, signal: level, unit: pct, normal: [35, 65], setpoint: 50, alarm_low: 20, trip_low: 10}
          - {type: valve, tag: FV-1354, signal: position, unit: pct, normal: [40, 75], setpoint: 60}
          - {type: pump, tag: P-1355, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: dcs, tag: DCS-135, signal: scan, unit: ms, normal: [1, 18], alarm_high: 50}
          - {type: sis, tag: SIS-135, signal: state, unit: sif, normal: [0, 0], trip_high: 1}
      - id: U-150
        name: "Vacuum Pipestill (VPS-1)"
        kind: separation
        gates: [hydrocarbon, fired]
        consumes: [steam, cooling_water]
        feeds: [U-720, U-610]
        elements:
          - {type: sensor, tag: TT-1501, signal: temp, unit: degC, normal: [380, 420], setpoint: 400, alarm_high: 440, trip_high: 460}
          - {type: sensor, tag: PT-1502, signal: pressure, unit: mbar, normal: [20, 60], setpoint: 40, alarm_high: 90}
          - {type: valve, tag: FV-1503, signal: position, unit: pct, normal: [40, 75], setpoint: 60}
          - {type: pump, tag: P-1504, signal: vibration, unit: mm/s, normal: [1.0, 4.0], alarm_high: 4.5, trip_high: 7.1}
          - {type: dcs, tag: DCS-150, signal: scan, unit: ms, normal: [1, 18], alarm_high: 50}


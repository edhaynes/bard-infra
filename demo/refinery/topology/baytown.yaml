    network:
      switch:   {type: switch, tag: SW-S3, signal: throughput, unit: Mbps, normal: [50, 400], alarm_high: 850}
      gateway:  {type: gateway, tag: GW-S3, signal: sessions, unit: count, normal: [10, 120], alarm_high: 240}
      hmi:      {type: workstation, tag: HMI-S3, signal: alarms, unit: count, normal: [0, 4], alarm_high: 12}
      ews:      {type: workstation, tag: EWS-S3, signal: cpu, unit: pct, normal: [5, 40], alarm_high: 85}
    units:
      - id: U-910
        name: "Sulfur Recovery (SRU-910)"

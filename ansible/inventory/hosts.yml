---
# Fleet inventory. Tailscale MagicDNS names are the stable addresses (IPs churn),
# so ansible_host is the MagicDNS NAME for tailnet hosts. BeaglePlay boards sit
# BEHIND gx10 (not on the tailnet) and are reached via ProxyJump through gx10.
# See shared-rules/connectivity.md for the host facts.
all:
  children:
    linux_nodes:
      hosts:
        gx10:
          ansible_host: gx10
          ansible_user: ehaynes
          ansible_connection: ssh
          ansible_python_interpreter: /usr/bin/python3

    beagleplay:
      # Debian ARM64 BeaglePlay boards behind gx10 (single-pair eth1 + USB
      # gadget). Reached by ProxyJump through gx10 — the Mac talks to gx10 over
      # the tailnet, gx10 bridges to the 192.168.7.x boards.
      hosts:
        snoopy:
          ansible_host: 192.168.7.2          # USB CDC-ethernet gadget on gx10 (verified 2026-06-27)
          ansible_user: debian
          ansible_python_interpreter: /usr/bin/python3
          ansible_ssh_common_args: '-o ProxyJump=ehaynes@gx10 -o StrictHostKeyChecking=accept-new'
        # beagle: second board on the single-pair (eth1) link. Address not yet a
        # reachable neighbour from gx10 (2026-06-27). Uncomment once confirmed:
        # beagle:
        #   ansible_host: 192.168.7.x
        #   ansible_user: debian
        #   ansible_python_interpreter: /usr/bin/python3
        #   ansible_ssh_common_args: '-o ProxyJump=ehaynes@gx10 -o StrictHostKeyChecking=accept-new'

    windows_nodes:
      hosts:
        # frogstation: Windows 11 GPU/ComfyUI helper. DAYTIME-ONLY — powered off
        # at night, so overnight unreachability is normal, not a fault.
        # BEING REIMAGED to "bullfrog" running Ubuntu (Eddie 2026-06-27). When
        # that lands, move it to linux_nodes as `bullfrog` (ansible_user: ehaynes)
        # and drop this windows entry.
        frogstation:
          ansible_host: frogstation

    # bard_fleet: nodes that should run the bard agent (podman). Only members
    # reachable today are active; beagle + bullfrog join when they come online.
    bard_fleet:
      children:
        linux_nodes: {}
        beagleplay: {}

---
# Fleet inventory. Tailscale MagicDNS names are the stable addresses (IPs churn),
# so ansible_host is always the MagicDNS NAME, never a raw IP.
all:
  children:
    linux_nodes:
      hosts:
        gx10:
          ansible_host: gx10
          ansible_user: ehaynes
          ansible_connection: ssh
          ansible_python_interpreter: /usr/bin/python3

    windows_nodes:
      hosts:
        # frogstation: Windows 11 GPU/ComfyUI helper. DAYTIME-ONLY — powered off
        # at night to keep noise down, so being unreachable overnight is normal,
        # not a fault. Connection details (WinRM) live in group_vars/windows_nodes.yml.
        frogstation:
          ansible_host: frogstation

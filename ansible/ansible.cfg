[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
interpreter_python = auto_silent
# YAML-formatted task output. The old `stdout_callback = yaml` plugin was removed
# in ansible-core; the supported equivalent is the default callback with
# result_format = yaml.
stdout_callback = default
result_format = yaml
# Fact caching (feature #91 fleet console). `gather_facts` writes one JSON per
# host to the cache dir; the control-plane facts projector reads it and serves
# GET /nodes. jsonfile = zero-dependency, ships with ansible-core. timeout 0 =
# facts never auto-expire (a re-run of playbooks/facts.yml refreshes them).
fact_caching = jsonfile
fact_caching_connection = .facts_cache
fact_caching_timeout = 0
# Vault password file is only used if present (gitignored). The linux play does
# not require it; the windows plays do (decrypt group_vars/windows_nodes/vault.yml).
vault_password_file = .vault_pass

[ssh_connection]
pipelining = True

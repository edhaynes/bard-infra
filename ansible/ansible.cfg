[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
interpreter_python = auto_silent
# YAML-formatted task output. The old `stdout_callback = yaml` plugin was removed
# in ansible-core; the supported equivalent is the default callback with
# result_format = yaml.
stdout_callback = default
result_format = yaml
# Vault password file is only used if present (gitignored). The linux play does
# not require it; the windows plays do (decrypt group_vars/windows_nodes/vault.yml).
vault_password_file = .vault_pass

[ssh_connection]
pipelining = True

# Bard CI (Lane E) — SUPERSEDED draft.
#
# The LIVE workflow is .github/workflows/bardpro-ci.yml (Sprint 4, v0.13.0),
# path-filtered to bardLLMPro/** so it coexists with the parent repo's iOS CI.
# This draft is kept only as the reference for the future repo split (it shows
# the single-repo layout: no path filter, podman manifest build, image smoke).
#
# Covers: lint + secret scan, unit tests on macOS + Linux, multi-arch agent
# image build (CLAUDE.md §4/§6/§9 — macOS+Linux CI, secret scan, tests).
name: bardpro-ci

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: bardLLMPro

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync --extra dev || uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2

  build-image:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
      - name: Build multi-arch agent image (no push)
        run: |
          podman build --platform linux/amd64,linux/arm64 \
            --manifest bardllm-pro-agent:ci \
            -f agent/Containerfile .
      - name: Smoke the image (amd64)
        run: |
          podman build -t bardllm-pro-agent:smoke -f agent/Containerfile .
          SECRET=$(python3 -c "import secrets;print(secrets.token_urlsafe(32))")
          CID=$(podman run -d --rm -e BARDPRO_JWT_SECRET="$SECRET" -p 8444:8444 \
            bardllm-pro-agent:smoke)
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8444/healthz && break || sleep 1
          done
          podman stop "$CID"
